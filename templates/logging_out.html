<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Logging Out…</title>
  <style>
    body{
      margin:0;
      height:100vh;
      display:grid;
      place-items:center;
      background:#071028;
      color:#e6eef6;
      font-family:Inter,system-ui;
      text-align:center;
      padding:20px;
    }
    .box{
      padding:20px 28px;
      background:rgba(255,255,255,0.05);
      border-radius:12px;
      backdrop-filter:blur(4px);
      border:1px solid rgba(255,255,255,0.06);
      animation:fade 1.8s ease infinite alternate;
    }
    @keyframes fade{
      from{opacity:.5}
      to{opacity:1}
    }
  </style>
</head>
<body>
  <div class="box">
    <h2>Logging you out…</h2>
    <p>Clearing your session and tidying up.</p>
  </div>

  <script>
    // After 1 second, go to login
    setTimeout(() => {
      window.location.href = "/web/login";
    }, 900);
  </script>
</body>
</html>
