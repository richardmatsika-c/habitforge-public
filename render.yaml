# render.yaml

services:
  # 1. The Redis Service
  - type: keyvalue
    name: redis
    plan: free
    ipAllowList: [] 
    
  # 2. The Web App
  - type: web
    name: app
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    
    envVars:
      # --- Database/Redis (from services) ---
      - key: DATABASE_URL
        fromDatabase:
          name: db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: redis
          type: keyvalue
          property: connectionString
          
      # --- Config ---
      - key: APP_ENV
        value: production
        
      # --- Secrets ---
      - key: SECRET_KEY
        generateValue: true  # YES: Render will create a secure, random key.
        
      - key: CLIENT_ORIGIN
        sync: false # NO: Use 'sync: false' to force Render
                    # to ask you for this value in the dashboard.
                    # You will fill it in with your app's public URL.

databases:
  # 3. The PostgreSQL Database
  - name: db
    databaseName: habitforge_db
    plan: free